{% extends "layout.html" %}

{% block title %}
    Sell
{% endblock %}

{% block main %}
<div>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">SYMBOL</th>
            <th scope="col">Stock Name</th>
            <th scope="col">Shares</th>
            <th scope="col">Share Price</th>

        </tr>
        </thead>
        <tbody>
            {% for row in table %}
            <tr>
                    <th scope="row">{{ row.symbol }}</th>
                    <td>{{ row.stock }}</td>
                    <td>{{ row.shares }}</td>
                    <td>{{ row.current_value | usd }}</td>

            </tr>
            {% endfor%}


        </tbody>
    </div>
<div class="row">
        <form action="/sell" method="POST">
        <div class="container text-center">
            <div class="row row-cols-auto">
                <div class="col">

                    <select  id="symbol" name="symbol" class="form-control">
                        <option selected>Select Stock to sell</option>
                        {% for row in table %}
                            <option name="symbol" value="{{ row.symbol }}">{{ row.stock }}</option>
                        {% endfor%}
                    </select>
                    </div>
                <div class="col">

                    <input class="form-control mx-auto w-auto" id="shares" name="shares" placeholder="Shares amount" type="number">
                </div>
                <div class="col"><button type="submit" class="btn btn-success">Sell</button>
                </div>
            </div>
        </form>
    </div>








        <thead>
            <tr>
                <th>Current Balance:</th>
                <td>{{ "%.2f" | format(cash) }}</td>
            </tr>
        </thead>

    </table>


{% endblock %}
