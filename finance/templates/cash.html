{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
    <form action="/cash" method="post">
        <p> Cash Balance: {{ cash | usd }}</p>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="cash" placeholder="Add cash" type="number">
        </div>

        <button class="btn btn-primary" type="submit">Add cash</button>
    </form>
{% endblock %}
