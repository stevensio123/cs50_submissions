<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            // TODO: Add code to check answers to questions
                function check(event)
                {
                    var answer = event.srcElement;

                    if (answer.innerHTML != 'Jeff Bezos')
                    {
                        answer.style.backgroundColor = "#ff0000";
                        document.querySelector('#part1').innerHTML = "Incorrect";
                    }
                    else
                    {
                        answer.style.backgroundColor = "#00ff00";
                        document.querySelector('#part1').innerHTML = "Correct";
                    }
                }
                function check2()
                {
                    let input = document.querySelector('#p2');

                    if (input.value.toLowerCase() != 'elon musk')
                    {
                        input.style.backgroundColor = 'red';
                        document.querySelector('#part2').innerHTML = "Incorrect";
                    }
                    else
                    {
                        input.style.backgroundColor = 'green';
                        document.querySelector('#part2').innerHTML = "Correct";
                    }
                }
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>
        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <!-- TODO: Add multiple choice question here -->
                <h3>Who is the CEO of Amazon?</h3>
                <button onclick ="check(event)">Elon Musk</button>
                <button onclick ="check(event)">Tim Cook</button>
                <button onclick ="check(event)">Mark Zuckerberg</button>
                <button onclick ="check(event)">Jeff Bezos</button>
                <p id="part1"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
                <h3>Who is the wealthiest man in the world as of 2022 October 3?</h3>
                <form onsubmit="check2()">
                    <input type="text" id="p2" />
                    <input type="submit"/>
                  </form>
                  <p id="part2"></p>
            </div>
        </div>
    </body>
</html>
